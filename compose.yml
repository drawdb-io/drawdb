services:
  drawdb:
    image: node:20-alpine
    container_name: drawdb
    ports:
      - 5173:5173
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: sh -c "npm install && npx concurrently 'vite --host' 'node server/index.js'"
    networks:
      - default

networks:
  default:
    driver: bridge
